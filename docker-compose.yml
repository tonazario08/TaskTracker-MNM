services:
  db:
    image: postgres:16
    container_name: tasktracker-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tasktracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tasktracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tasktracker-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: tasktracker
      DB_USER: postgres
      DB_PASSWORD: postgres
      SESSION_SECRET: change_me_please_replace_for_real_deployments
      CORS_ORIGIN: http://localhost:8080
      SESSION_TTL_HOURS: 24
    ports:
      - "8080:8080"

volumes:
  postgres_data:
