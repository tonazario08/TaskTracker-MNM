<!DOCTYPE html>
<html class="light" lang="vi">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TaskTracker - Dự án</title>
<meta name="description" content="Quản lý và theo dõi các dự án của bạn trên TaskTracker."/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode:"class",
    theme:{ extend:{
      colors:{
        "surface-tint":"#5b5f63","surface-container-low":"#f6f3f3","inverse-surface":"#313030",
        "surface":"#fcf8f8","primary-container":"#212529","surface-dim":"#dcd9d9",
        "secondary-container":"#e1e3e4","error":"#ba1a1a","primary-fixed":"#e0e3e8",
        "on-surface":"#1c1b1c","primary-fixed-dim":"#c3c7cc","outline-variant":"#c5c6ca",
        "on-background":"#1c1b1c","background":"#fcf8f8","on-surface-variant":"#44474a",
        "surface-container":"#f0eded","on-tertiary":"#ffffff","on-error":"#ffffff",
        "secondary":"#5c5f60","secondary-fixed":"#e1e3e4","on-primary-fixed-variant":"#43474c",
        "on-secondary-fixed-variant":"#454748","on-secondary":"#ffffff",
        "tertiary-container":"#2b231d","on-primary-container":"#888c91",
        "tertiary-fixed-dim":"#d2c4bb","on-secondary-container":"#626566",
        "surface-variant":"#e5e2e2","secondary-fixed-dim":"#c5c7c8",
        "surface-container-lowest":"#ffffff","inverse-primary":"#c3c7cc",
        "primary":"#0c1014","on-primary-fixed":"#181c20","surface-bright":"#fcf8f8",
        "outline":"#75777b","on-error-container":"#93000a","tertiary-fixed":"#efe0d6",
        "inverse-on-surface":"#f3f0f0","on-primary":"#ffffff",
        "surface-container-high":"#ebe7e7","surface-container-highest":"#e5e2e2",
        "error-container":"#ffdad6"
      },
      borderRadius:{"DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px"},
      spacing:{"xs":"4px","xl":"32px","md":"16px","container-max":"1200px","base":"8px","gutter":"24px","sm":"8px","lg":"24px"},
      fontFamily:{"logo":["Poppins"],"h3":["Poppins"],"h2":["Poppins"],"body-md":["Inter"],"h1":["Poppins"],"body-lg":["Inter"],"badge":["Inter"],"label-caps":["Inter"]},
      fontSize:{
        "logo":["24px",{"lineHeight":"1.2","letterSpacing":"-0.02em","fontWeight":"800"}],
        "h3":["18px",{"lineHeight":"1.4","fontWeight":"500"}],
        "h2":["24px",{"lineHeight":"1.4","fontWeight":"600"}],
        "body-md":["14px",{"lineHeight":"1.5","fontWeight":"400"}],
        "h1":["32px",{"lineHeight":"1.3","fontWeight":"600"}],
        "body-lg":["16px",{"lineHeight":"1.6","fontWeight":"400"}],
        "badge":["12px",{"lineHeight":"1","fontWeight":"500"}],
        "label-caps":["12px",{"lineHeight":"1.2","letterSpacing":"0.05em","fontWeight":"600"}]
      }
    }}
  }
</script>
<style>
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
  #project-modal{display:none} #project-modal.show{display:flex}
</style>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex">
<!-- SideNavBar -->
<nav class="bg-surface-container-lowest text-on-surface font-sans text-sm font-medium h-screen w-64 fixed left-0 top-0 overflow-y-auto border-r border-outline-variant flex flex-col gap-1 p-4 z-40">
  <div class="mb-8 mt-2 px-2 flex items-center gap-3">
    <div class="w-10 h-10 rounded-lg bg-primary-container flex items-center justify-center text-on-primary font-bold">T</div>
    <div>
      <h1 class="text-base font-black text-on-surface">TaskTracker</h1>
      <p class="text-xs text-on-surface-variant">Pro Edition</p>
    </div>
  </div>
  <button class="bg-primary-container text-on-primary font-body-md font-medium h-10 rounded-lg flex items-center justify-center gap-2 mb-6 w-full hover:opacity-90 transition-opacity" id="new-project-btn">
    <span class="material-symbols-outlined text-sm">add</span>Dự án mới
  </button>
  <div class="flex flex-col gap-1 flex-grow">
    <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container" href="./dashboard.html">
      <span class="material-symbols-outlined">dashboard</span>Dashboard
    </a>
    <a class="bg-surface-container-lowest text-on-surface shadow-sm rounded-lg flex items-center gap-3 px-3 py-2.5" href="./projects.html">
      <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">folder</span>Dự án
    </a>
    <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container" href="./tasks.html">
      <span class="material-symbols-outlined">assignment</span>Công việc
    </a>
    <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container" href="./kanban.html">
      <span class="material-symbols-outlined">view_kanban</span>Kanban
    </a>
  </div>
  <div class="flex flex-col gap-1 mt-auto pt-4 border-t border-surface-container-high">
    <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container" href="./settings.html">
      <span class="material-symbols-outlined">settings</span>Cài đặt
    </a>
    <button class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container w-full" id="logout-btn">
      <span class="material-symbols-outlined">logout</span>Đăng xuất
    </button>
  </div>
</nav>

<!-- Main Content Area -->
<div class="flex-1 md:ml-64 flex flex-col min-h-screen">
  <!-- TopAppBar -->
  <header class="bg-surface-container-lowest font-sans text-sm antialiased sticky top-0 z-50 border-b border-outline-variant shadow-sm flex justify-between items-center w-full px-6 py-2 h-16">
    <div class="flex items-center gap-4">
      <div class="relative hidden sm:block w-64">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-sm">search</span>
        <input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg pl-9 pr-3 py-1.5 text-sm focus:border-primary-container focus:ring-0 focus:outline-none" placeholder="Tìm kiếm dự án..." type="text" id="search-input"/>
      </div>
    </div>
    <div class="flex items-center gap-2 md:gap-4">
      <a href="./notifications.html" class="text-on-surface-variant hover:bg-surface-container p-2 rounded-full flex items-center justify-center">
        <span class="material-symbols-outlined">notifications</span>
      </a>
      <div class="w-8 h-8 rounded-full bg-primary-container text-on-primary flex items-center justify-center text-sm font-medium cursor-pointer" id="user-avatar">U</div>
    </div>
  </header>

  <!-- Page Content -->
  <main class="flex-1 p-4 md:p-6 lg:p-8 bg-background overflow-x-hidden">
    <div class="max-w-[1200px] mx-auto">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
        <h1 class="font-h1 text-h1 text-on-surface">Dự án</h1>
        <button class="bg-primary-container text-on-primary font-body-md font-medium h-10 px-5 rounded-lg flex items-center justify-center gap-2 hover:opacity-90 transition-opacity w-full sm:w-auto self-start" id="new-project-btn2">
          <span class="material-symbols-outlined text-sm">add</span>Dự án mới
        </button>
      </div>
      <!-- Filters -->
      <div class="flex border-b border-surface-variant mb-8 overflow-x-auto">
        <button class="px-4 py-3 font-body-md font-medium text-primary-container border-b-2 border-primary-container whitespace-nowrap" id="tab-all">Tất cả dự án</button>
        <button class="px-4 py-3 font-body-md font-medium text-on-surface-variant hover:text-on-surface border-b-2 border-transparent transition-colors whitespace-nowrap">Đang hoạt động</button>
        <button class="px-4 py-3 font-body-md font-medium text-on-surface-variant hover:text-on-surface border-b-2 border-transparent transition-colors whitespace-nowrap">Lưu trữ</button>
      </div>
      <!-- Projects Grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="projects-grid">
        <div class="col-span-3 text-center py-12 text-on-surface-variant font-body-md">Đang tải...</div>
      </div>
    </div>
  </main>
</div>

<!-- New Project Modal -->
<div id="project-modal" class="fixed inset-0 bg-black/40 z-[100] items-center justify-center">
  <div class="bg-surface-container-lowest rounded-xl shadow-xl w-full max-w-md mx-4 p-lg">
    <div class="flex items-center justify-between mb-lg">
      <h2 class="font-h3 text-h3 text-on-surface">Tạo dự án mới</h2>
      <button class="text-on-surface-variant hover:text-on-surface" id="close-project-modal">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <form id="project-form" class="space-y-md">
      <div>
        <label class="block font-label-caps text-label-caps text-on-surface-variant mb-xs">Tên dự án *</label>
        <input class="w-full border border-outline-variant rounded-lg px-md py-sm focus:outline-none focus:ring-1 focus:ring-primary" required type="text" name="name" placeholder="Nhập tên dự án..."/>
      </div>
      <div>
        <label class="block font-label-caps text-label-caps text-on-surface-variant mb-xs">Mô tả</label>
        <textarea class="w-full border border-outline-variant rounded-lg px-md py-sm focus:outline-none focus:ring-1 focus:ring-primary" name="description" rows="3" placeholder="Mô tả dự án..."></textarea>
      </div>
      <div class="flex justify-end gap-md pt-sm">
        <button type="button" class="px-md py-sm border border-outline-variant rounded-lg font-body-md text-body-md hover:bg-surface-container" id="cancel-project-modal">Hủy</button>
        <button type="submit" class="px-md py-sm bg-primary-container text-on-primary rounded-lg font-body-md text-body-md font-medium hover:opacity-90" id="submit-project-btn">Tạo dự án</button>
      </div>
    </form>
  </div>
</div>

<script>
const COLORS = ['#4A90E2','#50E3C2','#F5A623','#7B68EE','#E85D75','#43B89C'];
let allProjects = [], allTasks = [];

function renderProjects(projects) {
  const grid = document.getElementById('projects-grid');
  if (projects.length === 0) {
    grid.innerHTML = '<div class="col-span-3 text-center py-12 text-on-surface-variant font-body-md">Chưa có dự án nào. Hãy tạo dự án đầu tiên!</div>';
    return;
  }
  grid.innerHTML = projects.map((p, i) => {
    const color = COLORS[i % COLORS.length];
    const projectTasks = allTasks.filter(t => t.projectId === p.id);
    const done = projectTasks.filter(t => t.status === 'Done').length;
    const pct = projectTasks.length ? Math.round(done / projectTasks.length * 100) : 0;
    return `<div class="bg-surface-container-lowest rounded-xl border border-surface-variant shadow-[0_2px_4px_rgba(0,0,0,0.02)] overflow-hidden flex flex-col hover:shadow-[0_4px_12px_rgba(0,0,0,0.05)] transition-shadow">
      <div class="h-1 w-full" style="background:${color}"></div>
      <div class="p-5 flex-1 flex flex-col">
        <div class="flex justify-between items-start mb-3">
          <div class="w-10 h-10 rounded-lg flex items-center justify-center font-bold text-lg" style="background:${color}20;color:${color}">${p.name[0].toUpperCase()}</div>
        </div>
        <h3 class="font-h3 text-h3 text-on-surface mb-1">${p.name}</h3>
        <p class="font-body-md text-body-md text-on-surface-variant line-clamp-2 mb-5 flex-1">${p.description || 'Không có mô tả.'}</p>
        <div class="mb-5">
          <div class="flex justify-between items-center mb-2">
            <span class="font-badge text-badge text-on-surface-variant">Tiến độ</span>
            <span class="font-badge text-badge text-primary-container font-medium">${pct}%</span>
          </div>
          <div class="h-1.5 w-full bg-surface-container-high rounded-full overflow-hidden">
            <div class="h-full bg-primary-container rounded-full" style="width:${pct}%"></div>
          </div>
        </div>
        <div class="flex items-center justify-between mb-5 pt-4 border-t border-surface-variant">
          <div class="flex items-center gap-1.5 text-on-surface-variant">
            <span class="material-symbols-outlined text-sm">check_circle</span>
            <span class="font-badge text-badge">${projectTasks.length} công việc</span>
          </div>
        </div>
        <a href="./tasks.html" class="w-full h-9 rounded-lg border border-surface-variant font-body-md text-sm font-medium text-primary-container hover:bg-surface-container-low transition-colors flex items-center justify-center">
          Xem dự án
        </a>
      </div>
    </div>`;
  }).join('');
}

(async () => {
  const meRes = await fetch('/api/auth/me');
  if (!meRes.ok) { window.location.replace('/src/pages/login.html'); return; }
  const me = await meRes.json();
  document.getElementById('user-avatar').textContent = (me.name||me.email)[0].toUpperCase();

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await fetch('/api/auth/logout',{method:'POST'});
    window.location.replace('/src/pages/login.html');
  });

  const [projRes, tasksRes] = await Promise.all([fetch('/api/projects'), fetch('/api/tasks')]);
  allProjects = await projRes.json();
  allTasks = await tasksRes.json();
  renderProjects(allProjects);

  // Search
  document.getElementById('search-input').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    renderProjects(allProjects.filter(p => p.name.toLowerCase().includes(q)));
  });

  // Modal
  const modal = document.getElementById('project-modal');
  const open = () => modal.classList.add('show');
  const close = () => modal.classList.remove('show');
  document.getElementById('new-project-btn').addEventListener('click', open);
  document.getElementById('new-project-btn2').addEventListener('click', open);
  document.getElementById('close-project-modal').addEventListener('click', close);
  document.getElementById('cancel-project-modal').addEventListener('click', close);

  document.getElementById('project-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const btn = document.getElementById('submit-project-btn');
    btn.disabled = true; btn.textContent = 'Đang tạo…';
    const data = { name: form.name.value.trim(), description: form.description.value.trim() };
    try {
      const res = await fetch('/api/projects',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(data)});
      if (res.ok) {
        const newP = await res.json();
        allProjects.push(newP);
        renderProjects(allProjects);
        form.reset(); close();
      }
    } finally {
      btn.disabled = false; btn.textContent = 'Tạo dự án';
    }
  });
})();
</script>
</body>
</html>
