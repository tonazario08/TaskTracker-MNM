<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskTracker - Dang ky</title>
  <meta name="description" content="Tao tai khoan TaskTracker de bat dau quan ly cong viec cua ban." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#f8faf9; --panel:#fff; --ink:#18201d; --muted:#66736d; --line:#dfe7e2; --brand:#0f766e; --danger:#b42318; --soft:#e9f7f3; }
    *{box-sizing:border-box} body{margin:0;min-height:100vh;display:grid;place-items:center;padding:28px;background:var(--bg);font-family:Inter,system-ui,sans-serif;color:var(--ink)} a{color:inherit;text-decoration:none}
    .card{width:min(500px,100%);background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:34px;box-shadow:0 22px 70px rgba(15,23,42,.08)}
    .brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:26px;font-size:30px;font-weight:800}.brand span:first-child{color:#0f172a}.brand span:last-child{color:#64748b}
    h1{margin:0 0 8px;text-align:center;font-size:28px}.sub{text-align:center;color:var(--muted);margin:0 0 24px;line-height:1.6}.google{width:100%;min-height:48px;border:1px solid var(--line);border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;gap:10px;font-weight:700}.google:hover{background:#f8fafc}.g{font-weight:800;font-size:22px;color:#4285f4}
    .divider{display:flex;align-items:center;gap:14px;margin:24px 0;color:#718096;font-size:12px;font-weight:800;text-transform:uppercase}.divider:before,.divider:after{content:"";height:1px;background:var(--line);flex:1}
    .field{margin-bottom:15px}.field label{display:block;margin-bottom:7px;font-weight:700}.field input{width:100%;min-height:46px;border:1px solid var(--line);border-radius:12px;padding:11px 13px;font:inherit;outline:0}.field input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(15,118,110,.12)}
    .password-wrap{position:relative}.password-wrap input{padding-right:46px}.toggle{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:36px;height:36px;border:0;border-radius:50%;background:transparent;color:var(--muted);display:grid;place-items:center}.toggle:hover{background:var(--soft)}
    .btn{width:100%;min-height:50px;border:0;border-radius:12px;background:var(--brand);color:white;font-weight:800;font-size:16px}.btn:disabled{opacity:.65;cursor:not-allowed}.msg{display:none;margin:0 0 16px;padding:12px;border-radius:12px;font-size:14px;line-height:1.5}.msg.error{display:block;background:#fff1f0;color:var(--danger);border:1px solid #ffd8d5}.msg.ok{display:block;background:var(--soft);color:var(--brand);border:1px solid #ccebe3}.bottom{text-align:center;margin:24px 0 0;color:var(--muted)}.bottom a{color:var(--brand);font-weight:800}
  </style>
</head>
<body>
  <main class="card">
    <a class="brand" href="/"><span>Task</span><span>Tracker</span></a>
    <h1>Tao tai khoan moi</h1>
    <p class="sub">Bat dau quan ly cong viec hieu qua hon.</p>
    <a class="google" href="/auth/google"><span class="g">G</span>Dang ky bang Google</a>
    <div class="divider">hoac dang ky bang email</div>
    <p id="message" class="msg"></p>
    <form id="register-form">
      <div class="field"><label for="name">Ho va ten</label><input id="name" type="text" placeholder="Nguyen Van A" autocomplete="name" required /></div>
      <div class="field"><label for="email">Email</label><input id="email" type="email" placeholder="ten@congty.com" autocomplete="email" required /></div>
      <div class="field"><label for="password">Mat khau</label><div class="password-wrap"><input id="password" type="password" placeholder="Toi thieu 6 ky tu" autocomplete="new-password" required /><button class="toggle" type="button" data-toggle="password" aria-label="Hien mat khau"><span class="material-symbols-outlined">visibility</span></button></div></div>
      <div class="field"><label for="confirm-password">Xac nhan mat khau</label><div class="password-wrap"><input id="confirm-password" type="password" placeholder="Nhap lai mat khau" autocomplete="new-password" required /><button class="toggle" type="button" data-toggle="confirm-password" aria-label="Hien mat khau"><span class="material-symbols-outlined">visibility</span></button></div></div>
      <button class="btn" id="submit-btn" type="submit">Dang ky</button>
    </form>
    <p class="bottom">Da co tai khoan? <a href="/login">Dang nhap</a></p>
  </main>
  <script>
    const message = document.getElementById('message');
    const form = document.getElementById('register-form');
    const button = document.getElementById('submit-btn');
    function showMessage(text, type = 'error') { message.textContent = text; message.className = `msg ${type}`; }
    document.querySelectorAll('[data-toggle]').forEach(btn => btn.addEventListener('click', () => {
      const input = document.getElementById(btn.dataset.toggle);
      input.type = input.type === 'password' ? 'text' : 'password';
    }));
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm_password = document.getElementById('confirm-password').value;
      if (password !== confirm_password) return showMessage('Mat khau xac nhan khong khop.');
      button.disabled = true; button.textContent = 'Dang dang ky...'; message.className = 'msg';
      try {
        const res = await fetch('/api/auth/register', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ name, email, password, confirm_password }) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Dang ky that bai');
        showMessage(data.message || 'Dang ky thanh cong.', 'ok');
        setTimeout(() => { location.href = '/login'; }, 1800);
      } catch (err) { showMessage(err.message); }
      finally { button.disabled = false; button.textContent = 'Dang ky'; }
    });
  </script>
</body>
</html>
