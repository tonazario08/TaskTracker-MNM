<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register - TaskTracker</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          'primary': '#6750A4',
          'primary-container': '#EADDFF',
          'on-primary': '#FFFFFF',
          'secondary': '#625B71',
          'surface-container-low': '#F7F2FA',
          'surface-container-lowest': '#FFFFFF',
          'surface-container': '#F3EDF7',
          'on-surface': '#1C1B1F',
          'on-surface-variant': '#49454F',
          'outline': '#79747E',
          'outline-variant': '#CAC4D0',
          'inverse-surface': '#313033'
        },
        spacing: {
          'xs': '4px',
          'sm': '8px',
          'md': '16px',
          'lg': '24px',
          'xl': '32px'
        },
        fontSize: {
          'logo': ['28px', { lineHeight: '36px', fontWeight: '700' }],
          'h2': ['24px', { lineHeight: '32px', fontWeight: '600' }],
          'body-md': ['14px', { lineHeight: '20px', fontWeight: '400' }],
          'badge': ['12px', { lineHeight: '16px', fontWeight: '500' }]
        },
        fontFamily: {
          'logo': ['Poppins', 'sans-serif'],
          'h2': ['Poppins', 'sans-serif'],
          'body-md': ['Inter', 'sans-serif']
        }
      }
    }
  }
</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Poppins:wght@500;600;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>


  <link rel="stylesheet" href="/public/assets/css/RegisterPage.css"/>
</head>
<body class="bg-surface-container-low min-h-screen flex flex-col items-center justify-center p-md text-on-surface antialiased">
<div class="w-full max-w-[400px] bg-surface-container-lowest rounded-xl shadow-[0px_2px_4px_rgba(0,0,0,0.05)] border border-outline-variant p-lg flex flex-col">
<!-- Header -->
<div class="text-center mb-lg">
<div class="font-logo text-logo text-primary mb-md">TaskTracker</div>
<h1 class="font-h2 text-h2 text-on-surface mb-xs">Create an account</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Start managing your tasks better today</p>
</div>
<!-- Form -->
<form id="register-form" class="flex flex-col gap-md">
<!-- Full Name -->
<div class="flex flex-col gap-xs">
<label class="font-badge text-badge text-on-surface-variant" for="fullName">Full name</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-md py-[10px] text-body-md font-body-md focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-colors" id="fullName" placeholder="John Doe" type="text"/>
</div>
<!-- Email -->
<div class="flex flex-col gap-xs">
<label class="font-badge text-badge text-on-surface-variant" for="email">Email</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-md py-[10px] text-body-md font-body-md focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-colors" id="email" placeholder="name@company.com" type="email"/>
</div>
<!-- Password -->
<div class="flex flex-col gap-xs">
<label class="font-badge text-badge text-on-surface-variant" for="password">Password</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-md py-[10px] text-body-md font-body-md focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-colors" id="password" placeholder="••••••••" type="password"/>
<!-- Password Strength Bar -->
<div class="flex gap-xs mt-sm">
<div class="h-1 rounded-full w-full bg-error"></div>
<div class="h-1 rounded-full w-full bg-surface-variant"></div>
<div class="h-1 rounded-full w-full bg-surface-variant"></div>
<div class="h-1 rounded-full w-full bg-surface-variant"></div>
</div>
<span class="font-badge text-badge text-on-surface-variant mt-xs">Weak password</span>
</div>
<!-- Confirm Password -->
<div class="flex flex-col gap-xs">
<label class="font-badge text-badge text-on-surface-variant" for="confirmPassword">Confirm password</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-md py-[10px] text-body-md font-body-md focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-colors" id="confirmPassword" placeholder="••••••••" type="password"/>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-sm mt-xs">
<input class="mt-[2px] w-4 h-4 rounded-[4px] border-outline-variant text-primary focus:ring-primary focus:ring-offset-0 bg-surface-container-lowest" id="terms" type="checkbox"/>
<label class="font-body-md text-body-md text-on-surface-variant" for="terms">
                    I agree to the <a class="text-primary hover:underline" href="#">Terms and Conditions</a>
</label>
</div>
<!-- Submit Button -->
<button class="w-full mt-sm bg-primary-container text-on-primary font-label-caps text-label-caps uppercase rounded-lg py-[12px] flex items-center justify-center hover:opacity-90 transition-opacity" type="submit">
                Create account
            </button>
</form>
<!-- Footer Link -->
<div class="mt-lg text-center font-body-md text-body-md text-on-surface-variant">
            Already have an account? <a class="text-secondary font-medium hover:text-primary transition-colors" href="/login">Sign in</a>
</div>
</div>
  <script type="module" src="/public/assets/js/RegisterPage.js"></script>
</body></html>
